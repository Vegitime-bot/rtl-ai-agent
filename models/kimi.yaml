# Kimi k2.5 설정
provider: openai          # OpenAI 호환 API
endpoint: https://api.moonshot.cn/v1  # ← 실제 엔드포인트로 교체
model: moonshot-v1-256k   # ← 실제 모델명으로 교체

max_tokens: 16384   # spec/plan/summary 공용 + codegen용 (codegen은 별도 output_max_tokens로 override 가능)

context_window: 256000
temperature: 0.2
timeout: 7200
req_interval: 1.0
rate_limit_retries: 5
rate_limit_retry_base: 60
llm_log: "logs/llm.jsonl"   # LLM 요청/응답 로그 (비활성화하려면 주석 처리)
# api_key: ""  # 필요 시 설정 또는 MODEL_API_KEY 환경변수 사용
