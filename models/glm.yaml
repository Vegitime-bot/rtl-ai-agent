# GLM 4.7 사내망 설정
provider: openai
endpoint: http://사내망주소/v1   # ← 실제 주소로 교체
model: GLM4.7

# ── 출력 토큰 상한 (단계별 독립 설정) ─────────────────────
max_tokens: 65536        # RTL 생성 전용
analysis_max_tokens: 512
plan_max_tokens: 256
summary_max_tokens: 1024

context_window: 202752
temperature: 0.2
timeout: 7200
req_interval: 1.0        # 블록 간 LLM 호출 최소 대기(초) — rate limit 방지
rate_limit_retries: 5    # 429 발생 시 최대 재시도 횟수
rate_limit_retry_base: 60  # 재시도 기본 대기(초), 지수 backoff
llm_log: "logs/llm.jsonl"   # LLM 요청/응답 로그 (비활성화하려면 주석 처리)
# api_key: ""  # 필요 시 설정 또는 MODEL_API_KEY 환경변수 사용
