# GLM 4.7 사내망 설정
provider: openai
endpoint: http://사내망주소/v1   # ← 실제 주소로 교체
model: GLM4.7

max_tokens: 65536   # spec/plan/summary 공용 + codegen용 (codegen은 별도 output_max_tokens로 override 가능)
# patch mode 전용 출력 토큰 상한 (미설정 시 원본 크기 기반 자동 계산)
# patch_header_max_tokens: 2048   # header(port list) 재작성 출력 토큰
# patch_decl_max_tokens: 512      # 신호 선언 추가 출력 토큰

context_window: 202752
temperature: 0.2
timeout: 7200
req_interval: 1.0        # 블록 간 LLM 호출 최소 대기(초) — rate limit 방지
rate_limit_retries: 5    # 429 발생 시 최대 재시도 횟수
rate_limit_retry_base: 60  # 재시도 기본 대기(초), 지수 backoff
llm_log: "logs/llm.jsonl"
verify_causal_threshold: 0.5
# api_key: ""
